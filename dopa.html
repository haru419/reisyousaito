<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドパガキ診断</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:520px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,165,0,0.25);
transition:0.4s;
animation:fadeIn 0.6s ease;
}

.card:hover{
box-shadow:0 0 70px rgba(255,165,0,0.45);
}

h1{
text-align:center;
margin-bottom:15px;
}

.progress{
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff9800,#ff3d00);
transition:0.4s;
}

.question{
margin-bottom:20px;
min-height:60px;
font-size:18px;
}

button{
width:100%;
padding:13px;
margin:8px 0;
border-radius:12px;
border:1px solid #444;
background:#1f1f1f;
color:white;
cursor:pointer;
transition:0.25s;
font-size:14px;
}

button:hover{
background:#ff6a00;
transform:scale(1.05);
box-shadow:0 0 15px #ff6a00,
           0 0 35px #ff3d00;
}

#loading{
display:none;
text-align:center;
}

.loader{
width:80px;
height:80px;
border:8px solid #333;
border-top:8px solid #ff6a00;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

#result{
display:none;
text-align:center;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
<h1>⚡ ドパガキ診断</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="quiz">
<div class="question" id="question"></div>
<div id="answers"></div>
</div>

<div id="loading">
<div class="loader"></div>
<p>ドーパミン反応を解析中...</p>
</div>

<div id="result">
<h2 id="resultTitle"></h2>
<p id="resultComment"></p>
<button onclick="restart()">もう一度診断</button>
</div>

</div>

<script>

const questions = [
{
q:"スマホを触る頻度は？",
choices:[
{text:"ほぼ常に触ってる", point:3},
{text:"気づいたら触ってる", point:2},
{text:"たまに触る", point:1},
{text:"あまり触らない", point:0}
]
},
{
q:"動画を見るときは？",
choices:[
{text:"無限に見続ける", point:3},
{text:"おすすめに流される", point:2},
{text:"少しだけ見る", point:1},
{text:"あまり見ない", point:0}
]
},
{
q:"退屈な時間は？",
choices:[
{text:"耐えられない", point:3},
{text:"すぐスマホを触る", point:2},
{text:"少し苦手", point:1},
{text:"普通に過ごせる", point:0}
]
},
{
q:"通知が来たときは？",
choices:[
{text:"即反応", point:3},
{text:"かなり気になる", point:2},
{text:"あとで見る", point:1},
{text:"気にしない", point:0}
]
},
{
q:"ゲーム・SNSのやめどきは？",
choices:[
{text:"やめられない", point:3},
{text:"区切りが難しい", point:2},
{text:"ある程度でやめる", point:1},
{text:"すぐやめられる", point:0}
]
},
{
q:"新しい刺激への反応は？",
choices:[
{text:"すぐ飛びつく", point:3},
{text:"かなり興味を持つ", point:2},
{text:"普通", point:1},
{text:"あまり興味ない", point:0}
]
},
{
q:"集中力は？",
choices:[
{text:"すぐ切れる", point:3},
{text:"短い", point:2},
{text:"普通", point:1},
{text:"長く続く", point:0}
]
},
{
q:"褒められたり通知が来ると？",
choices:[
{text:"めっちゃ嬉しい", point:3},
{text:"かなり反応する", point:2},
{text:"少し嬉しい", point:1},
{text:"あまり気にしない", point:0}
]
}
];

let current=0;
let score=0;

const q=document.getElementById("question");
const ans=document.getElementById("answers");
const bar=document.getElementById("bar");

function load(){
q.textContent = questions[current].q;
ans.innerHTML = "";

questions[current].choices.forEach(c=>{
let btn=document.createElement("button");
btn.textContent=c.text;
btn.onclick=()=>select(c.point);
ans.appendChild(btn);
});

bar.style.width=((current)/questions.length*100)+"%";
}

function select(p){
score+=p;
current++;
if(current<questions.length){
load();
}else{
showLoading();
}
}

function showLoading(){
document.getElementById("quiz").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
showResult();
},1500);
}

function showResult(){
document.getElementById("result").style.display="block";
bar.style.width="100%";

let title="",comment="";

if(score<=5){
title="🟢 安定脳タイプ";
comment="ドーパミンに振り回されにくい安定型。";
}
else if(score<=10){
title="🟡 軽度ドパガキ";
comment="少し刺激に影響されやすいタイプ。";
}
else if(score<=16){
title="🟠 ドパガキ予備軍";
comment="刺激・通知に反応しやすい状態。";
}
else{
title="🔴 ドパガキ（高反応型）";
comment="ドーパミン刺激にかなり支配されやすいタイプ。少しデジタルデトックス推奨。";
}

document.getElementById("resultTitle").textContent=title;
document.getElementById("resultComment").textContent=comment;
}

function restart(){
current=0;
score=0;
document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";
load();
}

load();

</script>

</body>
</html>
