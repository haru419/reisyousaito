<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>先生からの印象診断</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:520px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,150,255,0.25);
transition:0.4s;
animation:fadeIn 0.6s ease;
}

.card:hover{
box-shadow:0 0 70px rgba(0,150,255,0.45);
}

h1{
text-align:center;
margin-bottom:15px;
}

.progress{
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#2563eb);
transition:0.4s;
}

.question{
margin-bottom:20px;
min-height:60px;
font-size:18px;
}

button{
width:100%;
padding:13px;
margin:8px 0;
border-radius:12px;
border:1px solid #444;
background:#1f1f1f;
color:white;
cursor:pointer;
transition:0.25s;
font-size:14px;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
box-shadow:0 0 15px #2563eb,
           0 0 35px #2563eb;
}

button:active{
transform:scale(0.95);
}

#loading{
display:none;
text-align:center;
}

.loader{
width:80px;
height:80px;
border:8px solid #333;
border-top:8px solid #38bdf8;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

#result{
display:none;
text-align:center;
animation:fadeIn 0.5s ease;
}

.result-img{
width:140px;
margin:15px auto;
border-radius:15px;
box-shadow:0 0 25px rgba(0,150,255,0.6);
transition:0.3s;
}

.result-img:hover{
transform:scale(1.05);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<h1>🏫 先生からの印象診断</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="quiz">
<div class="question" id="question"></div>
<div id="answers"></div>
</div>

<div id="loading">
<div class="loader"></div>
<p>先生の記憶を解析中...</p>
</div>

<div id="result">
<h2 id="resultTitle"></h2>
<img id="resultImg" class="result-img">
<p id="resultComment"></p>
<button onclick="restart()">もう一度診断</button>
</div>

</div>

<script>

const questions = [

{
q:"授業中のあなたは？",
choices:[
{text:"めちゃ真面目", point:0},
{text:"普通に受ける", point:1},
{text:"少しウトウト", point:2},
{text:"別世界にいる", point:3}
]
},

{
q:"提出物は？",
choices:[
{text:"毎回完璧", point:0},
{text:"普通に出す", point:1},
{text:"たまに忘れる", point:2},
{text:"存在を忘れる", point:3}
]
},

{
q:"先生の話を聞いてる？",
choices:[
{text:"しっかり聞く", point:0},
{text:"まあ聞く", point:1},
{text:"半分くらい", point:2},
{text:"全然別のこと考えてる", point:3}
]
},

{
q:"授業中に当てられると？",
choices:[
{text:"余裕で答える", point:0},
{text:"少し緊張", point:1},
{text:"焦る", point:2},
{text:"魂が抜ける", point:3}
]
},

{
q:"学校でのあなたの存在感は？",
choices:[
{text:"優等生", point:0},
{text:"普通", point:1},
{text:"少し目立つ", point:2},
{text:"問題児として有名", point:3}
]
},

{
q:"テスト前の行動は？",
choices:[
{text:"計画的に勉強", point:0},
{text:"普通に勉強", point:1},
{text:"ギリギリ開始", point:2},
{text:"一夜漬け", point:3}
]
},

{
q:"先生に注意されたことは？",
choices:[
{text:"ほぼない", point:0},
{text:"少しある", point:1},
{text:"結構ある", point:2},
{text:"伝説レベル", point:3}
]
},

{
q:"授業中の眠気は？",
choices:[
{text:"全くない", point:0},
{text:"少しある", point:1},
{text:"かなり眠い", point:2},
{text:"睡眠がメイン", point:3}
]
}

];

let current=0;
let score=0;

const q=document.getElementById("question");
const ans=document.getElementById("answers");
const bar=document.getElementById("bar");

function load(){

q.textContent = questions[current].q;
ans.innerHTML = "";

questions[current].choices.forEach(c=>{

let btn=document.createElement("button");

btn.textContent=c.text;

btn.onclick=()=>select(c.point);

ans.appendChild(btn);

});

bar.style.width=(current/questions.length*100)+"%";
}

function select(p){

score+=p;
current++;

if(current<questions.length){
load();
}else{
showLoading();
}

}

function showLoading(){

document.getElementById("quiz").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{

document.getElementById("loading").style.display="none";
showResult();

},1800);

}

function showResult(){

document.getElementById("result").style.display="block";
bar.style.width="100%";

let title="",comment="",img="";

if(score<=6){

title="📘 模範生タイプ";
comment="先生からかなり信頼されている優等生タイプ。";
img="https://i.imgur.com/5cX1F6M.png";

}else if(score<=12){

title="🙂 普通の生徒タイプ";
comment="特に問題もなく平和に学校生活を送るタイプ。";
img="https://i.imgur.com/8Km9tLL.png";

}else if(score<=18){

title="😎 要注意タイプ";
comment="先生に少しマークされている可能性があります。";
img="https://i.imgur.com/1Q9Z1ZK.png";

}else{

title="🔥 伝説の問題児タイプ";
comment="先生たちの記憶に深く刻まれている存在です。";
img="https://i.imgur.com/AbX9Y3K.png";

}

document.getElementById("resultTitle").textContent=title;
document.getElementById("resultComment").textContent=comment;
document.getElementById("resultImg").src=img;

}

function restart(){

current=0;
score=0;

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

load();

}

load();

</script>

</body>
</html>
