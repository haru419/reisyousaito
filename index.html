<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断サイト一覧</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:radial-gradient(circle at top,#1a1a2e,#000);
color:white;
overflow:hidden;
}

/* 背景エフェクト */
.stars{
position:absolute;
width:100%;
height:100%;
background:transparent;
overflow:hidden;
}

.stars::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation:moveStars 60s linear infinite;
opacity:0.2;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
position:relative;
z-index:2;
text-align:center;
padding-top:60px;
}

h1{
font-size:32px;
margin-bottom:10px;
text-shadow:0 0 10px #00e5ff;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.card{
width:85%;
max-width:420px;
padding:18px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
cursor:pointer;
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,229,255,0.4);
}

.card h2{
margin:0;
font-size:18px;
}

.card p{
margin:5px 0 0;
font-size:13px;
color:#aaa;
}

.glow{
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,#00e5ff55,transparent);
top:-50px;
right:-50px;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.footer{
margin-top:40px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

</html>
