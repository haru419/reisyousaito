<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断サイト一覧</title>

<style>
body {
  margin: 0;
  background: #000;
  color: red;
  font-family: sans-serif;
  text-align: center;
  padding-top: 100px;

  /* ↓ 修正ポイント */
  overflow-x: hidden;
}

/* 🌌 背景アニメ（星空） */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  z-index: -1;
}

.stars::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.15;
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-1000px);
  }
}

.box {
  border: 3px solid red;
  padding: 40px;
  width: 400px;
  margin: auto;
  margin-bottom: 100px;

  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

a {
  display: inline-block;
  margin-top: 20px;
  padding: 15px 30px;
  background: red;
  color: white;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  transition: 0.2s;
}

a:hover {
  background: darkred;
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}
</style>
</head>

<body>

<!-- 🌌 背景レイヤー -->
<div class="stars"></div>

<div class="box">
  <h1>診断サイト一覧</h1>

  <a href="reisyou.html">▶ 冷笑系度チェック</a><br><br>
  <a href="mental.html">▶ メンタルレベル診断</a><br><br>
  <a href="net.html">▶ ネット依存度チェック</a><br><br>
  <a href="dopa.html">▶ ドパガキ診断</a><br><br>
  <a href="ADHD.html">▶ ADHD診断</a><br><br>
  <a href="testmae.html">▶ テスト前診断</a><br><br>
  <a href="nou.html">▶ 脳みそ年齢診断</a><br><br>
  <a href="rouzin.html">▶ インターネット老人会診断</a><br><br>
  <a href="ningen.html">▶ 人間やめてる度診断</a>
</div>

<audio id="clickSound" src="クリック.mp3" preload="auto"></audio>

<script>
const clickSound = document.getElementById("clickSound");

document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click", (e)=>{
    e.preventDefault();

    clickSound.currentTime = 0;
    clickSound.play();

    setTimeout(()=>{
      location.href = link.href;
    },150);
  });
});
</script>

</body>
</html>
