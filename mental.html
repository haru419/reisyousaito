<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンタル耐久値診断</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:520px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,0,100,0.25);
transition:0.4s;
animation:fadeIn 0.6s ease;
}

.card:hover{
box-shadow:0 0 70px rgba(255,0,100,0.45);
}

h1{
text-align:center;
margin-bottom:15px;
}

.progress{
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4e50,#f9d423);
transition:0.4s;
}

.question{
margin-bottom:20px;
min-height:60px;
font-size:18px;
}

button{
width:100%;
padding:13px;
margin:8px 0;
border-radius:12px;
border:1px solid #444;
background:#1f1f1f;
color:white;
cursor:pointer;
transition:0.25s;
font-size:14px;
}

button:hover{
background:#ff4e50;
transform:scale(1.05);
box-shadow:0 0 15px #ff4e50,
           0 0 35px #ff4e50;
}

button:active{
transform:scale(0.95);
}

#loading{
display:none;
text-align:center;
}

.loader{
width:80px;
height:80px;
border:8px solid #333;
border-top:8px solid #ff4e50;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

#result{
display:none;
text-align:center;
animation:fadeIn 0.5s ease;
}

.result-img{
width:140px;
margin:15px auto;
border-radius:15px;
box-shadow:0 0 25px rgba(255,0,100,0.6);
transition:0.3s;
}

.result-img:hover{
transform:scale(1.05);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="card">
<h1>🛡 メンタル耐久値診断</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="quiz">
<div class="question" id="question"></div>
<div id="answers"></div>
</div>

<div id="loading">
<div class="loader"></div>
<p>精神状態を解析中...</p>
</div>

<div id="result">
<h2 id="resultTitle"></h2>
<img id="resultImg" class="result-img">
<p id="resultComment"></p>
<button onclick="restart()">もう一度診断</button>
</div>

</div>

<script>
const questions = [
{
  q: "ちょっとしたミスをどれくらい引きずる？",
  choices: [
    { text:"全然気にしない", point:0 },
    { text:"少し気になる", point:1 },
    { text:"結構引きずる", point:2 },
    { text:"かなり落ち込む", point:3 }
  ]
},
{
  q: "否定的なコメントをもらったら？",
  choices: [
    { text:"スルーできる", point:0 },
    { text:"少し気になる", point:1 },
    { text:"普通に傷つく", point:2 },
    { text:"ずっと考える", point:3 }
  ]
},
{
  q: "大勢の前で失敗したら？",
  choices: [
    { text:"笑って流す", point:0 },
    { text:"ちょっと恥ずかしい", point:1 },
    { text:"しばらく引きずる", point:2 },
    { text:"消えたくなるレベル", point:3 }
  ]
},
{
  q: "忙しさが続くと？",
  choices: [
    { text:"むしろ平気", point:0 },
    { text:"ちょい疲れる", point:1 },
    { text:"ストレスたまる", point:2 },
    { text:"限界になる", point:3 }
  ]
},
{
  q: "人間関係で揉めたら？",
  choices: [
    { text:"気にしない", point:0 },
    { text:"軽くモヤる", point:1 },
    { text:"かなり引きずる", point:2 },
    { text:"メンタル崩れる", point:3 }
  ]
},
{
  q: "プレッシャーがかかると？",
  choices: [
    { text:"燃えるタイプ", point:0 },
    { text:"普通にやる", point:1 },
    { text:"緊張する", point:2 },
    { text:"頭真っ白", point:3 }
  ]
},
{
  q: "将来の不安を考えると？",
  choices: [
    { text:"あまり考えない", point:0 },
    { text:"たまに不安", point:1 },
    { text:"よく考える", point:2 },
    { text:"かなり怖い", point:3 }
  ]
},
{
  q: "連続で嫌なことが起きたら？",
  choices: [
    { text:"気にしない", point:0 },
    { text:"まあ耐える", point:1 },
    { text:"結構きつい", point:2 },
    { text:"完全に落ちる", point:3 }
  ]
}
];

let current=0;
let score=0;

const q=document.getElementById("question");
const ans=document.getElementById("answers");
const bar=document.getElementById("bar");

function load(){
q.textContent = questions[current].q;
ans.innerHTML = "";

questions[current].choices.forEach(c=>{
let btn=document.createElement("button");
btn.textContent=c.text;
btn.onclick=()=>select(c.point);
ans.appendChild(btn);
});

bar.style.width=(current/questions.length*100)+"%";
}

function select(p){
score+=p;
current++;
if(current<questions.length){
load();
}else{
showLoading();
}
}

function showLoading(){
document.getElementById("quiz").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
showResult();
},1800);
}

function showResult(){
document.getElementById("result").style.display="block";
bar.style.width="100%";

let title="",comment="",img="";

if(score<=6){
title="🛡 鋼メンタル";
comment="多少のことでは揺らがない最強タイプ。";
img="https://i.imgur.com/5cX1F6M.png";
}else if(score<=12){
title="🧱 安定型";
comment="基本は安定。でも無理しすぎ注意。";
img="https://i.imgur.com/8Km9tLL.png";
}else if(score<=18){
title="💢 不安定型";
comment="ダメージを受けやすい状態かも。";
img="https://i.imgur.com/1Q9Z1ZK.png";
}else{
title="💥 ガラスの心";
comment="今は少し休む時間が必要かもしれません。";
img="https://i.imgur.com/AbX9Y3K.png";
}

document.getElementById("resultTitle").textContent=title;
document.getElementById("resultComment").textContent=comment;
document.getElementById("resultImg").src=img;
}

function restart(){
current=0;
score=0;
document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";
load();
}

load();
</script>

</body>
</html>
