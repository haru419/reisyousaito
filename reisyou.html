<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷笑系度チェック</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 0 40px rgba(0,114,255,0.3);
  animation: fadeIn 0.6s ease;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.progress {
  height: 6px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00f2fe,#4facfe);
  transition: 0.4s;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
  min-height: 60px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  background: #1f1f1f;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #4facfe;
  transform: scale(1.03);
}

#result {
  display: none;
  text-align: center;
}

.result-img {
  width: 120px;
  margin: 15px auto;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0,114,255,0.6);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

button:active {
  transform: scale(0.95);
}

.fade-out {
  animation: fadeOut 0.3s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: translateY(-10px);
  }
}
</style>
</head>
<body>

<div class="card">
<h1>😏 冷笑系度チェック</h1>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="quiz">
  <div class="question" id="question"></div>
  <div id="answers"></div>
</div>

<div id="result">
  <h2 id="resultTitle"></h2>
  <img id="resultImg" class="result-img" src="">
  <p id="resultComment"></p>
  <button onclick="restart()">もう一回やる</button>
</div>

</div>

<script>
const questions = [

{
  text: "流行っているものを見ると？",
  choices: [
    { text: "すぐ試したくなる", point: 0 },
    { text: "人気なら見てみる", point: 1 },
    { text: "少し疑いながら見る", point: 2 },
    { text: "ブームに乗る人を観察する", point: 3 }
  ]
},

{
  text: "SNSで誰かが努力投稿していたら？",
  choices: [
    { text: "素直に応援する", point: 0 },
    { text: "すごいなと思う", point: 1 },
    { text: "ちょっと痛く感じる", point: 2 },
    { text: "承認欲求かな？と分析する", point: 3 }
  ]
},

{
  text: "感動エピソード動画を見たら？",
  choices: [
    { text: "普通に泣く", point: 0 },
    { text: "いい話だなと思う", point: 1 },
    { text: "少し冷めてしまう", point: 2 },
    { text: "演出構成を考察する", point: 3 }
  ]
},

{
  text: "友達が本気で夢を語ってきたら？",
  choices: [
    { text: "全力で応援する", point: 0 },
    { text: "話はちゃんと聞く", point: 1 },
    { text: "現実的な指摘をする", point: 2 },
    { text: "成功確率を計算してしまう", point: 3 }
  ]
},

{
  text: "ポジティブ全開な人を見ると？",
  choices: [
    { text: "元気をもらえる", point: 0 },
    { text: "すごいなと思う", point: 1 },
    { text: "少し疲れる", point: 2 },
    { text: "裏を勘ぐってしまう", point: 3 }
  ]
},

{
  text: "みんなが絶賛している映画を観たら？",
  choices: [
    { text: "普通に楽しむ", point: 0 },
    { text: "良かったと思う", point: 1 },
    { text: "期待ほどではないと思う", point: 2 },
    { text: "世間の評価とのズレを分析する", point: 3 }
  ]
},

{
  text: "炎上騒動を見たとき？",
  choices: [
    { text: "心配になる", point: 0 },
    { text: "状況を見守る", point: 1 },
    { text: "どっちもどっちと思う", point: 2 },
    { text: "社会構造の問題だと考える", point: 3 }
  ]
},

{
  text: "流行語を聞いたとき？",
  choices: [
    { text: "すぐ使う", point: 0 },
    { text: "たまに使う", point: 1 },
    { text: "あまり使わない", point: 2 },
    { text: "なぜ流行ったか考察する", point: 3 }
  ]
},

{
  text: "成功者インタビューを見ると？",
  choices: [
    { text: "素直に尊敬する", point: 0 },
    { text: "努力はすごいと思う", point: 1 },
    { text: "環境も大きいよなと思う", point: 2 },
    { text: "再現性を冷静に検証する", point: 3 }
  ]
},

{
  text: "誰かが本気で怒っている場面を見たら？",
  choices: [
    { text: "感情に共感する", point: 0 },
    { text: "事情を理解しようとする", point: 1 },
    { text: "少し引いてしまう", point: 2 },
    { text: "感情のメカニズムを考察する", point: 3 }
  ]
}

];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const bar = document.getElementById("bar");

function load() {
  const currentQ = questions[current];

  questionEl.textContent = currentQ.text;
  answersEl.innerHTML = "";

  // ▼ 選択肢をシャッフル
  const shuffled = [...currentQ.choices].sort(() => Math.random() - 0.5);

  shuffled.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice.text;

    btn.onclick = () => animateAndSelect(btn, choice.point);

    answersEl.appendChild(btn);
  });

  bar.style.width = (current / questions.length * 100) + "%";
}

function select(point) {
  score += point;
  current++;
  if(current < questions.length){
    load();
  } else {
    showResult();
  }
}

function animateAndSelect(button, point) {
  button.style.background = "#4facfe";
  button.style.transform = "scale(0.95)";

  setTimeout(() => {
    document.querySelectorAll("#answers button").forEach(b => {
      b.classList.add("fade-out");
    });

    setTimeout(() => {
      select(point);
    }, 300);

  }, 150);
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
  bar.style.width="100%";

  let title="", comment="", img="";

  if(score<=8){
    title="🌱 純粋タイプ";
    comment="まだ世界を信じているピュアな存在。";
    img="https://i.imgur.com/1Q9Z1ZK.png";
  }else if(score<=16){
    title="😏 冷笑予備軍";
    comment="少しずつ斜め視点が育っています。";
    img="https://i.imgur.com/8Km9tLL.png";
  }else if(score<=23){
    title="🧠 冷笑系";
    comment="物事を一歩引いて見る達人。";
    img="https://i.imgur.com/5cX1F6M.png";
  }else{
    title="👑 超越者";
    comment="完全に一段上から世界を眺めています。";
    img="https://i.imgur.com/AbX9Y3K.png";
  }

  document.getElementById("resultTitle").textContent=title;
  document.getElementById("resultComment").textContent=comment;
  document.getElementById("resultImg").src=img;
}

function restart(){
  current=0;
  score=0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").style.display="none";
  load();
}

load();
</script>

</body>
</html>
