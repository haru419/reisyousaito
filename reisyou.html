<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷笑系度チェック</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 0 40px rgba(0,114,255,0.3);
  animation: fadeIn 0.6s ease;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.progress {
  height: 6px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00f2fe,#4facfe);
  transition: 0.4s;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
  min-height: 60px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  background: #1f1f1f;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #4facfe;
  transform: scale(1.03);
}

#result {
  display: none;
  text-align: center;
}

.result-img {
  width: 120px;
  margin: 15px auto;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0,114,255,0.6);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>
<body>

<div class="card">
<h1>😏 冷笑系度チェック</h1>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="quiz">
  <div class="question" id="question"></div>
  <div id="answers"></div>
</div>

<div id="result">
  <h2 id="resultTitle"></h2>
  <img id="resultImg" class="result-img" src="">
  <p id="resultComment"></p>
  <button onclick="restart()">もう一回やる</button>
</div>

</div>

<script>
const questions = [
"流行っているものを見ると？",
"熱血系コンテンツを見ると？",
"感動話を見たら？",
"SNS炎上を見たら？",
"努力アピール投稿を見ると？",
"ポジティブ全開な人を見ると？",
"みんな絶賛している作品を見ると？",
"流行語を聞いたとき？",
"夢を語る人を見ると？",
"真剣に怒っている人を見ると？"
];

const choices = [
{ text: "素直に楽しむ", point: 0 },
{ text: "普通に見る", point: 1 },
{ text: "少し距離を置く", point: 2 },
{ text: "冷静に分析する", point: 3 }
];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const bar = document.getElementById("bar");

function load() {
  questionEl.textContent = questions[current];
  answersEl.innerHTML = "";

  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.textContent = c.text;
    btn.onclick = () => select(c.point);
    answersEl.appendChild(btn);
  });

  bar.style.width = (current / questions.length * 100) + "%";
}

function select(point) {
  score += point;
  current++;
  if(current < questions.length){
    load();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
  bar.style.width="100%";

  let title="", comment="", img="";

  if(score<=8){
    title="🌱 純粋タイプ";
    comment="まだ世界を信じているピュアな存在。";
    img="https://i.imgur.com/1Q9Z1ZK.png";
  }else if(score<=16){
    title="😏 冷笑予備軍";
    comment="少しずつ斜め視点が育っています。";
    img="https://i.imgur.com/8Km9tLL.png";
  }else if(score<=23){
    title="🧠 冷笑系";
    comment="物事を一歩引いて見る達人。";
    img="https://i.imgur.com/5cX1F6M.png";
  }else{
    title="👑 超越者";
    comment="完全に一段上から世界を眺めています。";
    img="https://i.imgur.com/AbX9Y3K.png";
  }

  document.getElementById("resultTitle").textContent=title;
  document.getElementById("resultComment").textContent=comment;
  document.getElementById("resultImg").src=img;
}

function restart(){
  current=0;
  score=0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").style.display="none";
  load();
}

load();
</script>

</body>
</html>
